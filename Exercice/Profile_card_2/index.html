<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Card</title>

    <link rel="stylesheet" href="css/style.css">

    <!--Box icon-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    <div class="contenair">
        <div class="profile-card">
            <img src="image/profile-card-img.jpg">
        </div>

        <div class="text-span">

            <span class="coding">CodingLab</span>
            <span class="job">YouTuber & Blogger</span>
            
        </div>

        <div class="logo">

            
                <a href="" class="link" style="background-color: rgb(36, 36, 202);">
                    <i class='bx bxl-facebook'></i>
                </a>
    
        
                <a href="" class="link" style="background-color: rgb(106, 210, 236);">
                    <i class='bx bxl-twitter'></i>
                </a>
        
                <a href="" class ="link" style="background-color: rgb(170, 15, 54);">
                    <i class='bx bxl-instagram'></i>
                </a>

    
                <a href="" class="link" style="background-color: rgb(233, 10, 10);">
                    <i class='bx bxl-youtube'></i>
                </a>
            
        </div>

        <form action="">
            <button>Subscriber</button>
            <button>Message</button>
        </form>

        <div class="reaction">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="number">60k</span>
            </div>

            <div class="data">
                <i class='bx bx-message-rounded' ></i>
                <span class="number">20k</span>
            </div>

            <div class="data">
                <i class='bx bx-share' ></i>
                <span class="number">10k</span>
            </div>
        </div>
    </div>
    
</body>
</html>
