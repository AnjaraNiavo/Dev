<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking | Card</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!--Box icon-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    <section>
        <div class="container">
                <div class="card front-face">
                    <header>
                        <span class="logo">
                            <img src="images/logo.png">
                            <h5>MASTER CARD</h5>
                        </span>
                        <img src="images/chip.png" class="chip">
                    </header>

                    <div class="card-details">
                        <div class="name-number">
                            <h6>Card Number</h6>
                            <h5 class="number">8050 2030 3020 5040</h5>
                            <h5 class="name">Anjara Niavo</h5>
                        </div>

                        <div class="valid-data">
                            <h6>Valid Thru</h6>
                            <h5>05/28</h5>
                        </div>

                    </div>
                </div>

                <div class="card back-face">
                    <h6>
                        For customer service call +977 4343 3433 or email at
                        niavoanjara23gmail.com
                    </h6>

                    <span class="magnetic-strip">
                        <div class="signature"><i>005</i></div>
                        <h5>Lorem ipsum dolor sit amet consectetur adipisicing elit. Illo illum vel explicabo accusamus quos quibusdam modi voluptatibus libero?</h5>
                    </span>
                    
                </div>
        </div>
    </section>
</body>
</html>
