<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
        <div class="images-container">
            <img src="téléchargement.jpeg" class="profile-img">
        </div>

        <div class="span-text">
            <h1 class="Coding">CodingLab</h1>
            <h4 class="job">Youtube & Job</h4>
        </div>

        <div class="media-buttons">
            <a href="#" style="background-color: #4267b2;" class="link">
                <i class='bx bxl-facebook'></i>
            </a>
            <a href="#" style="background-color: #1da1f2;" class="link">
                <i class='bx bxl-twitter'></i>
            </a>
            <a href="#"  style="background-color: #e1306c;"class="link">
                <i class='bx bxl-youtube' ></i>
            </a>
            <a href="#"  style="background-color: #ff0000;" class="link">
                <i class='bx bxl-instagram-alt' ></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Subscriber</button>
            <button class="button">Message</button>
        </div>

        <div class="analytic">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="number">60k</span>
            </div>

            <div class="data">
                <i class='bx bx-message-rounded' ></i>
                <span class="number">20k</span>
            </div>

            <div class="data">
                <i class='bx bx-share' ></i>
                <span class="number">10k</span>
            </div>
        </div>

    </div>


   

    
</body>
</html>
